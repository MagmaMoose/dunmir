name: Worker CI

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-ci.yml"
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/worker-ci.yml"

# Default GITHUB_TOKEN permissions for every job — read-only.
permissions:
  contents: read

concurrency:
  group: worker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@e348410e00f449ac1d3ddf1e7e6c43e5e1d04920 # v6.0.0
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx cryptography
      - name: Compile check
        run: python -m compileall -q src
      - name: Tenant isolation + auth tests
        run: pytest -q
      # Wrangler bundles the Python Worker; a dry-run validates the deploy shape.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Wrangler dry deploy
        env:
          CLOUDFLARE_API_TOKEN: dummy
        run: npx --yes wrangler@4 deploy --dry-run --outdir dist
