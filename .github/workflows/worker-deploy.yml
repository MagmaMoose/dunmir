name: Worker Deploy

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Opt into the `prod` GitHub Environment so env-scoped secrets resolve.
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@e348410e00f449ac1d3ddf1e7e6c43e5e1d04920 # v6.0.0
        with:
          python-version: "3.12"

      - name: Install test deps
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-standalone.txt
          pip install pytest pytest-asyncio

      - name: Tenant isolation + auth tests
        working-directory: worker
        run: pytest -q

      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4.42.0"
          command: d1 migrations apply minder --remote --env prod

      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: "4.42.0"
          command: deploy --env prod
