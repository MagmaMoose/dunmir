# Demo Postgres for the control plane. For production, prefer a managed Postgres
# (RDS / Cloud SQL / Neon) and point DATABASE_URL at it instead of running this.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: minder
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: minder
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: minder
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minder-backend
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: minder
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "minder", "-d", "minder"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
