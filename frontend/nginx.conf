server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the runtime config or the HTML shell, so a redeploy /
    # restart with a new API_BASE takes effect immediately.
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA fallback: serve index.html for any unmatched route.
    location / {
        try_files $uri /index.html;
    }
}
